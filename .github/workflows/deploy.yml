name: Deploy Sky-Takeout Docker

on:
  push:
    branches: [ "master" ] # 只有推送到 master 分支时才触发

env:
  # 镜像名称，格式为 ghcr.io/你的用户名/仓库名
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # 关键权限：允许 Actions 读写 GitHub 的软件包仓库
    permissions:
      contents: read
      packages: write

    steps:
      # --- 阶段一：构建 Jar 包 ---
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        # 跳过测试以加快构建速度
        run: mvn clean package -DskipTests

      # --- 阶段二：构建并推送 Docker 镜像 ---
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase Image Name
        run: |
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >>${GITHUB_ENV}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest

      # --- 阶段三：远程连接服务器部署 ---
      - name: Deploy to Huawei Cloud
        uses: appleboy/ssh-action@master
        with:
          host: 1.94.238.104
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. 登录镜像仓库 (确保服务器有权拉取)
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 2. 停止并移除旧容器 (如果有)
            docker stop sky-takeout || true
            docker rm sky-takeout || true
            
            # 3. 强制拉取最新镜像
            docker pull ${{ env.IMAGE_NAME }}:latest
            
            # 4. 启动新容器
            # 如果你的 MySQL 在宿主机上，记得把数据库连接地址改为服务器内网/公网IP
            docker run -d \
              --name sky-takeout \
              --restart always \
              -p 8080:8080 \
              -e TZ=Asia/Shanghai \
              ${{ env.IMAGE_NAME }}:latest
            
            # 5. 清理悬空镜像 (可选，清理旧版本产生的垃圾)
            docker image prune -f