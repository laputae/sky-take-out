name: Deploy Sky-Takeout (Fast Mode)

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        # 跳过测试，加快打包速度
        run: mvn clean package -DskipTests

      # === 核心步骤 1：把 Jar 包和 Dockerfile 传到服务器临时目录 ===
      - name: Copy Jar and Dockerfile to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # 只需要传这两个关键文件
          source: "sky-server/target/*.jar,Dockerfile"
          target: "/root/sky_temp_deploy"
          # 保持目录结构，避免 Dockerfile 找不到路径
          strip_components: 0

      # === 核心步骤 2：在服务器上构建并重启 ===
      - name: Build and Restart Docker on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 设置变量
            APP_NAME="sky-takeout"
            DEPLOY_DIR="/root/sky-deploy"
            TEMP_DIR="/root/sky_temp_deploy"
            
            echo "1. 准备部署目录..."
            # 为了配合你现有的 Dockerfile (COPY sky-server/target/*.jar)，我们需要还原目录结构
            rm -rf $DEPLOY_DIR
            mkdir -p $DEPLOY_DIR/sky-server/target
            
            # 移动文件到位
            mv $TEMP_DIR/Dockerfile $DEPLOY_DIR/
            mv $TEMP_DIR/sky-server/target/*.jar $DEPLOY_DIR/sky-server/target/app.jar
            
            # 清理临时上传目录
            rm -rf $TEMP_DIR
            
            echo "2. 进入目录开始构建..."
            cd $DEPLOY_DIR
            
            # 停止并删除旧容器 (如果存在)
            docker stop $APP_NAME || true
            docker rm $APP_NAME || true
            
            # 删除旧的镜像 (为了节省磁盘空间)
            docker rmi $APP_NAME:local || true
            
            # 本地构建镜像 (这一步极快，因为基础镜像层有缓存)
            docker build -t $APP_NAME:local .
            
            echo "3. 启动新容器..."
            docker run -d \
              --name $APP_NAME \
              --restart always \
              -p 8080:8080 \
              -e TZ=Asia/Shanghai \
              -e SPRING_DATASOURCE_URL="jdbc:mysql://172.17.0.1:3306/sky_take_out?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true" \
              -e SPRING_DATASOURCE_DRUID_URL="jdbc:mysql://172.17.0.1:3306/sky_take_out?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true" \
              -e SPRING_DATASOURCE_USERNAME="root" \
              -e SPRING_DATASOURCE_PASSWORD="Mp.20xcdgu" \
              $APP_NAME:local
            
            echo "部署完成！"