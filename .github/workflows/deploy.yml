name: Deploy sky-take-out (Fast Mode)

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 1. 传输文件
      - name: Copy Jar and Dockerfile to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "sky-server/target/*.jar,Dockerfile"
          target: "/root/sky_temp_deploy"
          strip_components: 0

      # 2. 远程构建 (遇到错误会立即中断)
      - name: Build and Restart Docker on Server
        id: build-step  # 给步骤个ID，方便后续引用（虽然这里主要靠 job.status）
        uses: appleboy/ssh-action@master
        env:
          MY_DB_USER: ${{ secrets.DB_USERNAME }}
          MY_DB_PASS: ${{ secrets.DB_PASSWORD }}
          MY_REDIS_PASS: ${{ secrets.REDIS_PASSWORD }}
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_SECRET: ${{ secrets.WECHAT_SECRET }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: MY_DB_USER,MY_DB_PASS,MY_REDIS_PASS,WECHAT_APPID,WECHAT_SECRET
          # 设置超时时间，防止网络卡死导致的无限等待
          command_timeout: 30m
          script: |
            # ▼▼▼ 核心：一旦任何命令出错（如构建失败），立即停止脚本并报错 ▼▼▼
            set -e

            APP_NAME="sky-take-out"
            DEPLOY_DIR="/root/sky-deploy"
            TEMP_DIR="/root/sky_temp_deploy"
            
            echo "--- 1. 整理文件结构 ---"
            rm -rf $DEPLOY_DIR
            mkdir -p $DEPLOY_DIR/sky-server/target
            mv $TEMP_DIR/Dockerfile $DEPLOY_DIR/
            mv $TEMP_DIR/sky-server/target/*.jar $DEPLOY_DIR/sky-server/target/app.jar
            rm -rf $TEMP_DIR
            
            echo "--- 2. 开始构建镜像 ---"
            cd $DEPLOY_DIR
            
            # 清理旧容器（加 || true 防止因容器不存在而报错停止）
            docker stop $APP_NAME || true
            docker rm $APP_NAME || true
            docker rmi $APP_NAME:local || true
            
            # 构建镜像 (如果不成功，set -e 会让脚本在这里直接退出，触发 Failure 状态)
            # 这里去掉了 sed 命令，直接使用你服务器配置好的镜像源
            docker build -t $APP_NAME:local .
            
            echo "--- 3. 启动新容器 ---"
            docker run -d \
              --name $APP_NAME \
              --restart always \
              --network host \
              -v /dev/urandom:/dev/random \
              -v /root/sky-logs:/tmp/sky-logs \
              -e TZ=Asia/Shanghai \
              -e "SPRING_PROFILES_ACTIVE=prod" \
              -e "logging.file.path=/tmp/sky-logs" \
              -e "MY_DB_USER=$MY_DB_USER" \
              -e "MY_DB_PASS=$MY_DB_PASS" \
              -e "MY_REDIS_PASS=$MY_REDIS_PASS" \
              -e "WECHAT_APPID=$WECHAT_APPID" \
              -e "WECHAT_SECRET=$WECHAT_SECRET" \
              $APP_NAME:local
            
            echo "✅ 部署脚本执行完毕"

      # 3. 钉钉通知 (无论成功还是失败都会发送)
      - name: 发送钉钉通知
        if: always()  # <--- 重要：确保即使上面步骤失败了，这一步也会执行
        run: |
          # 根据任务状态判断发送什么表情和文字
          if [ "${{ job.status }}" == "success" ]; then
            STATUS_EMOJI="✅ 构建成功"
            COLOR_CODE="#00FF00" # 绿色看起来心情好
          else
            STATUS_EMOJI="❌ 构建失败 (请检查日志)"
            COLOR_CODE="#FF0000" # 红色警示
          fi
          
          DING_URL="https://oapi.dingtalk.com/robot/send?access_token=${{ secrets.DING_TOKEN }}"
          
          # 发送 Markdown 消息
          curl "$DING_URL" \
            -H 'Content-Type: application/json' \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"title\": \"GitHub Action 通知\",
                \"text\": \"### sky-take-out 部署通知\n\n**状态**: ${STATUS_EMOJI}\n\n**分支**: ${{ github.ref_name }}\n\n**提交**: ${{ github.event.head_commit.message }}\n\n[🔍 点击查看详细日志](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n****\"
              },
              \"at\": {
                \"isAtAll\": false
              }
            }"