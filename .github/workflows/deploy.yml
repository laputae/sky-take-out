name: Deploy sky-take-out (Source Build Mode)

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 直接传源码，速度最快
      - name: Copy Source to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_SSH_KEY }}
          source: "./*"
          target: "/root/sky-source"

      # 2. 在服务器上编译并运行
      - name: Build and Run on Server
        uses: appleboy/ssh-action@master
        env:
          MY_DB_USER: ${{ secrets.DB_USERNAME }}
          MY_DB_PASS: ${{ secrets.DB_PASSWORD }}
          MY_REDIS_PASS: ${{ secrets.REDIS_PASSWORD }}
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_SECRET: ${{ secrets.WECHAT_SECRET }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_SSH_KEY }}
          envs: MY_DB_USER,MY_DB_PASS,MY_REDIS_PASS,WECHAT_APPID,WECHAT_SECRET
          script: |
            set -e
            cd /root/sky-source
            
            echo "--- 1. 服务器本地编译 ---"
            mvn clean package -DskipTests
            
            echo "--- 2. 查找 JAR 包 ---"
            # 自动定位生成的 jar 文件
            APP_JAR=$(find sky-server/target -name "sky-server-*.jar" | head -n 1)
            
            echo "--- 3. 停止旧 Java 进程 ---"
            # 根据端口 8080 杀进程，比杀名字更准
            fuser -k 8080/tcp || true
            
            echo "--- 4. 启动新程序 ---"
            # 注入所有环境变量并指定 prod 环境
            nohup java -Xms512m -Xmx1024m \
              -Dspring.profiles.active=prod \
              -Dspring.datasource.druid.username=$MY_DB_USER \
              -Dspring.datasource.druid.password=$MY_DB_PASS \
              -DMY_REDIS_PASS=$MY_REDIS_PASS \
              -DWECHAT_APPID=$WECHAT_APPID \
              -DWECHAT_SECRET=$WECHAT_SECRET \
              -jar $APP_JAR > /root/sky-app.log 2>&1 &
            
            echo "✅ 部署成功，日志位于 /root/sky-app.log"