name: Deploy Sky-Takeout (Fast Mode)

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        # 跳过测试，加快打包速度
        run: mvn clean package -DskipTests

      # === 核心步骤 1：把 Jar 包和 Dockerfile 传到服务器临时目录 ===
      - name: Copy Jar and Dockerfile to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # 只需要传这两个关键文件
          source: "sky-server/target/*.jar,Dockerfile"
          target: "/root/sky_temp_deploy"
          # 保持目录结构，避免 Dockerfile 找不到路径
          strip_components: 0

      # === 核心步骤 2：在服务器上构建并重启 ===
      - name: Build and Restart Docker on Server
        uses: appleboy/ssh-action@master
        # 1. 在这里定义环境变量，把 GitHub Secrets 赋值给临时变量
        env:
          MY_DB_USER: ${{ secrets.DB_USERNAME }}
          MY_DB_PASS: ${{ secrets.DB_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # 2. 告诉插件：请把这两个变量传送到华为云服务器里去！
          envs: MY_DB_USER,MY_DB_PASS
          script: |
            APP_NAME="sky-takeout"
            DEPLOY_DIR="/root/sky-deploy"
            TEMP_DIR="/root/sky_temp_deploy"
            
            echo "--- 1. 整理文件结构 ---"
            rm -rf $DEPLOY_DIR
            mkdir -p $DEPLOY_DIR/sky-server/target
            mv $TEMP_DIR/Dockerfile $DEPLOY_DIR/
            mv $TEMP_DIR/sky-server/target/*.jar $DEPLOY_DIR/sky-server/target/app.jar
            rm -rf $TEMP_DIR
            
            echo "--- 2. 开始构建镜像 ---"
            cd $DEPLOY_DIR
            docker stop $APP_NAME || true
            docker rm $APP_NAME || true
            docker rmi $APP_NAME:local || true
            docker build -t $APP_NAME:local .
            
            echo "--- 3. 启动新容器 ---"
            # 注意：下面引用变量时，要用 $MY_DB_USER 和 $MY_DB_PASS (这是我们在上面 envs 里传进来的)
            docker run -d \
              --name $APP_NAME \
              --restart always \
              -p 8080:8080 \
              -e TZ=Asia/Shanghai \
              -e SPRING_DATASOURCE_URL="jdbc:mysql://172.17.0.1:3306/sky_take_out?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true" \
              -e SPRING_DATASOURCE_DRUID_URL="jdbc:mysql://172.17.0.1:3306/sky_take_out?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true" \
              -e SPRING_DATASOURCE_USERNAME="$MY_DB_USER" \
              -e SPRING_DATASOURCE_PASSWORD="$MY_DB_PASS" \
              $APP_NAME:local
            
            echo "✅ 部署成功！"
            # ... 上面是你已有的步骤，比如 mvn package ...

      - name: 发送钉钉通知 (直观文字版)
        if: always()
        run: |
          # 1. 根据构建状态设置 emoji
          if [ "${{ job.status }}" == "success" ]; then
            STATUS_EMOJI="✅ 成功"
          else
            STATUS_EMOJI="❌ 失败"
          fi
          
          # 2. 拼接完整的钉钉 URL (手动补全 https 前缀)
          # 注意：这里把 secrets.DING_TOKEN 拼在了 access_token= 后面
          DING_URL="https://oapi.dingtalk.com/robot/send?access_token=${{ secrets.DING_TOKEN }}"
          
          # 3. 发送请求
          curl "$DING_URL" \
            -H 'Content-Type: application/json' \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"title\": \"GitHub Action 构建通知\",
                \"text\": \"### 🚀 GitHub Action 构建通知\n\n**项目**: ${{ github.repository }}\n\n**状态**: ${STATUS_EMOJI}\n\n**分支**: ${{ github.ref_name }}\n\n**提交信息**: ${{ github.event.head_commit.message }}\n\n[查看详细日志](https://github.com/${{ github.repository }}/actions)\"
              }
            }"