server:
  port: 8080

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  # 这里只保留 Druid 的通用设置，不要写 url/username/password
  datasource:
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      # 下面这些连接池的通用设置可以放这里
      initial-size: 5
      max-active: 20
      min-idle: 5
      max-wait: 60000
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sky.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.sky: info

# 纯业务配置保留在 sky 下
sky:
  jwt:
    admin-secret-key: itcast
    admin-ttl: 7200000
    admin-token-name: token