name: Deploy Sky-Takeout (Fast Mode)

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      # === 核心步骤 1：把 Jar 包和 Dockerfile 传到服务器临时目录 ===
      - name: Copy Jar and Dockerfile to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "sky-server/target/*.jar,Dockerfile"
          target: "/root/sky_temp_deploy"
          strip_components: 0

      # === 核心步骤 2：在服务器上构建并重启 ===
      - name: Build and Restart Docker on Server
        uses: appleboy/ssh-action@master
        env:
          MY_DB_USER: ${{ secrets.DB_USERNAME }}
          MY_DB_PASS: ${{ secrets.DB_PASSWORD }}
          MY_REDIS_PASS: ${{ secrets.REDIS_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: MY_DB_USER,MY_DB_PASS,MY_REDIS_PASS
          script: |
            APP_NAME="sky-takeout"
            DEPLOY_DIR="/root/sky-deploy"
            TEMP_DIR="/root/sky_temp_deploy"
            
            echo "--- 1. 整理文件结构 ---"
            rm -rf $DEPLOY_DIR
            mkdir -p $DEPLOY_DIR/sky-server/target
            mv $TEMP_DIR/Dockerfile $DEPLOY_DIR/
            mv $TEMP_DIR/sky-server/target/*.jar $DEPLOY_DIR/sky-server/target/app.jar
            rm -rf $TEMP_DIR
            
            echo "--- 2. 开始构建镜像 ---"
            cd $DEPLOY_DIR
            docker stop $APP_NAME || true
            docker rm $APP_NAME || true
            docker rmi $APP_NAME:local || true
            docker build -t $APP_NAME:local .
            
            echo "--- 3. 启动新容器 (Host模式 + Prod环境) ---"
            docker run -d \
              --name $APP_NAME \
              --restart always \
              --network host \
              -v /dev/urandom:/dev/random \
              -e TZ=Asia/Shanghai \
              -e "SPRING_PROFILES_ACTIVE=prod" \
              -e "MY_DB_PASS=$MY_DB_PASS" \
              -e "MY_REDIS_PASS=$MY_REDIS_PASS" \
              $APP_NAME:local
            
            echo "✅ 部署成功！"

      # === 钉钉通知部分保持不变 ===
      - name: 发送钉钉通知 (带声音提醒版)
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            STATUS_EMOJI="✅ 成功"
          else
            STATUS_EMOJI="❌ 失败"
          fi
          DING_URL="https://oapi.dingtalk.com/robot/send?access_token=${{ secrets.DING_TOKEN }}"
          curl "$DING_URL" \
            -H 'Content-Type: application/json' \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"title\": \"GitHub Action 构建通知\",
                \"text\": \"### 🚀 GitHub Action 构建通知\n\n**项目**: ${{ github.repository }}\n\n**状态**: ${STATUS_EMOJI}\n\n**分支**: ${{ github.ref_name }}\n\n**提交信息**: ${{ github.event.head_commit.message }}\n\n[查看详细日志](https://github.com/${{ github.repository }}/actions)\n\n**@所有人**\"
              },
              \"at\": {
                \"isAtAll\": true
              }
            }"